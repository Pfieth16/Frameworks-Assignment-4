<div class="card text-bg-dark mb-3" style="max-width: 90rem;">
  <div class="card-body">
    <h4 class="card-title">{{expense().title}} <span class="badge text-bg-warning" [class]="badgeClass()">{{expense().category}}</span></h4>
    <h5>${{expense().amount}}</h5> 
    <a [routerLink]="['edit', expense().id]" class="btn btn-primary">Edit</a>
    <button class="btn btn-danger" (click)="onDeleteExpense()">Delete</button>
  </div>
</div>
